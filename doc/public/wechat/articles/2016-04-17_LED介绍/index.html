-sizing: border-box; visibility: visible;"><span style="font-size: 14px; visibility: visible;"><p style="visibility: visible;"> 发光二极管简称为LED。由含镓（Ga）、砷（As）、磷（P）、氮（N）等的化合物制成。<br style="visibility: visible;"/>当电子与空穴复合时能辐射出可见光，因而可以用来制成发光二极管。在电路及仪器中作为指示灯，或者组成文字或数字显示。砷化镓二极管发红光，磷化镓二极管发绿光，碳化硅二极管发黄光，氮化镓二极管发蓝光。因化学性质又分有机发光二极管OLED和无机发光二极管LED。 </p></span></section></section></section></section></section></section></section></section></section></section><section class="" data-source="bj.96weixin.com" style="visibility: visible;"><section class="" style="visibility: visible;"><fieldset class="" data-width="100%" style="text-align: center; border: 0px rgb(245, 189, 209); box-sizing: border-box; width: 100%; margin-top: 1.2em; margin-bottom: 0.5em; visibility: visible;"><section data-width="80%" style="margin-right: auto; margin-left: auto; width: 80%; border: 8px solid white; box-sizing: border-box; display: inline-block; vertical-align: top; color: inherit; visibility: visible;"><img _width="378px" alt="图片" border="0" data-fail="0" data-index="6" data-original-style="width: 378px; border: 8px solid white; margin-right: 0.5em; margin-bottom: -1em; box-shadow: rgb(102, 102, 102) 2px 2px 5px; -webkit-transform: rotateZ(-10deg); height: 357px; color: inherit;" data-ratio="2.458602469094898" data-report-img-idx="2" data-src="img_7.jpg" data-type="jpeg" data-w="378.44444370269775" data-wxsrc="http://mmbiz.qpic.cn/mmbiz/p6Vlqvia1UiczKYzR5BFpbgdTZibauic3QAlkib288QrjJVwmGcDDGocFhL3ubPmnY88kdX5LK9TxonqUnObQDfG0qg/0?wx_fmt=jpeg" height="357" src="img_8.webp" style="width: 378px !important; border: 8px solid white; margin-right: 0.5em; margin-bottom: -1em; box-shadow: rgb(102, 102, 102) 2px 2px 5px; transform: rotateZ(-10deg); height: auto !important; color: inherit; visibility: visible !important;" title="1460901415863647.jpg" vspace="0" width="378"/><img _width="328px" alt="图片" border="0" data-fail="0" data-index="7" data-original-style="width: 328px; border: 8px solid white; margin-right: 0
